<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Wallet</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2c3e50;
        }
        
        .wallet-container {
            text-align: center;
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 350px;
        }
        
        .welcome-text {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 5px;
            color: #7f8c8d;
        }
        
        .wallet-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #3498db;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .option-button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .create-button {
            background-color: #3498db;
            color: white;
        }
        
        .import-button {
            background-color: transparent;
            color: #3498db;
            border: 2px solid #3498db;
        }
        
        .create-button:hover {
            background-color: #2980b9;
        }
        
        .import-button:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="wallet-container">
        <div class="welcome-text">Welcome to the</div>
        <div class="wallet-name">Snow Wallet</div>
        
        <button class="option-button create-button">Create a New Wallet</button>
        <button class="option-button import-button">Import an Existing Wallet</button>
    </div>
</body>
</html>
