<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0f1c; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; background: #12172b; border-radius: 16px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #4fc3f7; }
        button { background: #4fc3f7; border: none; padding: 12px; width: 100%; border-radius: 8px; margin: 10px 0; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0288d1; }
        .hidden { display: none; }
        .address-display { background: #1e263d; padding: 10px; border-radius: 8px; word-break: break-all; margin: 15px 0; }
        .phrase-box { background: #1e263d; padding: 10px; border-radius: 8px; margin: 15px 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; outline: none; }
        .copy-btn { background: #0288d1; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="welcomeScreen">
        <h1>Welcome to Snow Wallet</h1>
        <button onclick="createNewWallet()">Create New Wallet</button>
        <button onclick="openImportModal()">Import Wallet</button>
    </div>

    <div class="container hidden" id="walletContainer">
        <h1>Snow Wallet</h1>
        <div class="address-display">Your address will appear here</div>
        <button class="copy-btn" onclick="copyAddress()">Copy Address</button>
    </div>

    <div class="container hidden" id="recoveryContainer">
        <h1>Recovery Phrase</h1>
        <div class="phrase-box" id="recoveryPhrase"></div>
        <p style="color: #ff5252; font-size: 14px;">⚠️ Save this phrase securely! It restores your wallet.</p>
        <button onclick="proceedToWallet()">I Saved It</button>
    </div>

    <div class="container hidden" id="importContainer">
        <h1>Import Wallet</h1>
        <textarea id="importPhrase" rows="3" placeholder="Enter your 12-word recovery phrase"></textarea>
        <button onclick="importWallet()">Import</button>
        <button onclick="closeImportModal()">Cancel</button>
    </div>

    <script>
        let currentRecoveryPhrase = [];
        let walletAddress = null;

        // Load saved wallet if exists
        window.onload = function () {
            const savedAddress = localStorage.getItem("walletAddress");
            if (savedAddress) {
                walletAddress = savedAddress;
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('walletContainer').style.display = 'block';
                document.querySelector('.address-display').textContent = walletAddress;
            }
        };

        // Generate random demo recovery phrase (12 words)
        function generateRecoveryPhrase() {
            const words = ["snow","coin","chain","wallet","crypto","block","mining","token","secure","digital","key","frost","arctic","value","hash","network","safe","ledger"];
            let phrase = [];
            for (let i = 0; i < 12; i++) {
                phrase.push(words[Math.floor(Math.random() * words.length)]);
            }
            return phrase;
        }

        function generateRandomAddress() {
            return '0x' + Array.from({ length: 40 }, () =>
                '0123456789abcdef'[Math.floor(Math.random() * 16)]
            ).join('');
        }

        function createNewWallet() {
            currentRecoveryPhrase = generateRecoveryPhrase();
            if (!walletAddress) {
                walletAddress = generateRandomAddress();
                localStorage.setItem("walletAddress", walletAddress);
            }
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('recoveryContainer').style.display = 'block';
            document.getElementById('recoveryPhrase').textContent = currentRecoveryPhrase.join(" ");
        }

        function proceedToWallet() {
            document.getElementById('recoveryContainer').style.display = 'none';
            document.getElementById('walletContainer').style.display = 'block';
            document.querySelector('.address-display').textContent = walletAddress;
        }

        function openImportModal() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('importContainer').style.display = 'block';
        }

        function closeImportModal() {
            document.getElementById('importContainer').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'block';
        }

        function importWallet() {
            const phraseInput = document.getElementById('importPhrase').value.trim();
            if (!phraseInput) {
                alert('Please enter your recovery phrase');
                return;
            }

            const phraseWords = phraseInput.split(/\s+/);
            if (phraseWords.length !== 12) {
                alert('Recovery phrase must be 12 words');
                return;
            }

            if (!walletAddress) {
                walletAddress = generateRandomAddress();
                localStorage.setItem("walletAddress", walletAddress);
            }

            closeImportModal();
            document.getElementById('walletContainer').style.display = 'block';
            document.querySelector('.address-display').textContent = walletAddress;
            alert('Wallet imported successfully!');
        }

        function copyAddress() {
            const address = document.querySelector('.address-display').textContent;
            navigator.clipboard.writeText(address.trim());
            alert('Address copied to clipboard!');
        }
    </script>
</body>
</html>
