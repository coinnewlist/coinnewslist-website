<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptocurrency Live Price</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: skyblue;
            text-align: center;
            margin: 20px;
        }
        .container {
            width: 95%;
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 5px;
            background: white;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f4f4f4;
            font-size: 16px;
        }
        td {
            font-size: 15px;
        }
        .crypto-logo {
            width: 20px;
            vertical-align: middle;
            margin-right: 5px;
        }
        .loading {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        @media (max-width: 600px) {
            th, td {
                font-size: 14px;
                padding: 8px;
            }
            nav a {
                font-size: 14px;
                padding: 6px 10px;
            }
            .crypto-logo {
                width: 18px;
            }
        }
    </style>
    <script>
        async function fetchCryptoData() {
            try {
                let response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                let data = await response.json();
                
                let tableBody = document.querySelector("tbody");
                tableBody.innerHTML = "";
                
                data.forEach((crypto, index) => {
                    let row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td><img src="${crypto.image}" class="crypto-logo"> ${crypto.name}</td>
                        <td class="market-cap loading">$${crypto.market_cap.toLocaleString()}</td>
                        <td class="price loading">$${crypto.current_price.toFixed(2)}</td>
                        <td class="change loading" style="color: ${crypto.price_change_percentage_24h >= 0 ? 'green' : 'red'}">${crypto.price_change_percentage_24h.toFixed(2)}%</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching crypto data:', error);
            }
        }
        
        setInterval(fetchCryptoData, 500);
        window.onload = fetchCryptoData;
    </script>
</head>
<body>
    <h2><img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="crypto-logo"> CoinNewList</h2>
    
    <nav>
        <a href="#">All Crypto</a>
        <a href="#">NewList</a>
        <a href="#">Trending</a>
        <a href="#">News</a>
        <a href="#">CoinNewList</a>
    </nav>
    
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Market Cap</th>
                    <th>Price</th>
                    <th>24h %</th>
                </tr>
            </thead>
            <tbody>
                <!-- Crypto data will be injected here dynamically -->
            </tbody>
        </table>
    </div>
</body>
</html>
